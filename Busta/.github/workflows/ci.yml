# Add this badge to README.md: [![CI](https://github.com/<owner>/<repo>/actions/workflows/ci.yml/badge.svg)](https://github.com/<owner>/<repo>/actions/workflows/ci.yml)

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint and test dependencies
        run: pip install ruff pytest numpy scipy scikit-learn opencv-python-headless Flask Werkzeug

      - name: Lint
        run: ruff check src/ tests/ scripts/

      - name: Test
        run: pytest tests/ -v --ignore=tests/test_model.py --ignore=tests/test_gradcam.py --ignore=tests/test_augmentation.py --ignore=tests/test_transfer_model.py
